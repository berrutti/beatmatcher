<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <clipPath id="clip">
    <circle cx="256" cy="256" r="256"/>
  </clipPath>

  <!-- Wave 1 (orange) -->
  <path
    d="M 0 256 C 80 256, 100 80, 180 80 C 260 80, 280 432, 360 432 C 440 432, 460 256, 512 256"
    fill="none"
    stroke="#f97316"
    stroke-width="52"
    stroke-linecap="round"
    clip-path="url(#clip)"
  />

  <!-- Wave 2 (cyan) -->
  <path
    d="M 0 256 C 80 256, 100 432, 180 432 C 260 432, 280 80, 360 80 C 440 80, 460 256, 512 256"
    fill="none"
    stroke="#38bdf8"
    stroke-width="52"
    stroke-linecap="round"
    clip-path="url(#clip)"
  />
</svg>
