name: Build and Release

on:
  push:
    branches: [main]

jobs:
  deploy:
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile
      - run: yarn build:web

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist-web

      - uses: actions/deploy-pages@v5
        id: deployment

  build-mac:
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: read
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile
      - run: yarn dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v6
        with:
          name: mac
          path: dist/*.dmg

  build-win:
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: read
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile
      - run: yarn dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v6
        with:
          name: win
          path: dist/*.exe

  publish:
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    needs: [build-mac, build-win]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: artifacts/**
          body: |
            ## Install

            | Platform | Download |
            |----------|----------|
            | macOS | `.dmg` below |
            | Windows | `.exe` below |

            ### macOS — first launch
            The app is not code-signed. After dragging it to Applications, run once in Terminal:
            ```bash
            xattr -cr /Applications/Beatmatcher.app
            ```

            ---

            [Try it in the browser](https://berrutti.github.io/beatmatcher/)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
